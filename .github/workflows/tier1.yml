name: tier1

on:
  pull_request:
  push:
    branches: [main]

concurrency:
  group: tier1-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  tier1:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - name: Install toolchain (clang for LLVM backend tests)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends clang

      - name: Toolchain versions
        run: |
          cc --version
          clang --version
          make --version | head -1

      # Pin CC=clang so the runner uses the same compiler family
      # as the macOS dev environment (clang). R5 (the euler4
      # main-thread stack overflow that was previously gated by
      # `BASELINE=23`) was fully resolved by issue #37: the
      # emitter rewrites every self-tail-call into a goto-loop
      # at the C-emit boundary, so deep self-recursion now uses
      # O(1) C-stack and does not depend on `RLIMIT_STACK` (the
      # PR #36 runtime constructor was the interim fix and has
      # been removed). CI reads `demos/baseline.txt = 24` like
      # local mac.
      - name: tier0 (selfhost byte-identical + demos baseline)
        run: make CC=clang tier0

      - name: tier1 (full make test + demos baseline)
        run: make CC=clang tier1

      - name: Working tree clean check
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "::error::working tree dirty after tier1; build artifacts leaked into tracked paths"
            git status
            exit 1
          fi
